services:

  mongo:
    image: mongo:7
    container_name: medplatform-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: vamos
      MONGO_INITDB_DATABASE: BuildathonDB
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: medplatform-server
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 3001
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:vamos@mongo:27017/BuildathonDB?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: claude-sonnet-4-5
      ANTHROPIC_FAST_MODEL: claude-haiku-4-5
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
    ports:
      - "3001:3001"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: medplatform-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  mongo-data:
